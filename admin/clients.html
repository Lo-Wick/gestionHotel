<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clients | Célestia Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body class="admin-body">

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-brand">CÉLESTIA ADMIN</div>
            <nav class="admin-sidebar-nav">
                <a href="index.html"><span class="material-symbols-outlined">analytics</span> Tableau de bord</a>
                <a href="chambres.html"><span class="material-symbols-outlined">hotel</span> Chambres</a>
                <a href="reservations.html"><span class="material-symbols-outlined">calendar_month</span> Réservations</a>
                <a href="clients.html" class="active"><span class="material-symbols-outlined">group</span> Clients</a>
                <a href="paiements.html"><span class="material-symbols-outlined">payments</span> Paiements</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-page-header">
                <h1>Clients</h1>
                <p>Gestion des comptes utilisateurs enregistrés.</p>
            </header>

            <div class="table-wrapper">
                <div class="table-header">
                    <input type="text" placeholder="Rechercher un client..." class="form-input" style="width: 300px;" id="client-search">
                </div>
                <table id="clients-table">
                    <thead>
                        <tr>
                            <th>Nom & Prénom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Rôle</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/modal.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!await Admin.requireAuth()) return;
            Admin.loadClientsTable();

            let timer;
            document.getElementById('client-search')?.addEventListener('input', (e) => {
                clearTimeout(timer);
                timer = setTimeout(() => Admin.loadClientsTable(e.target.value.trim()), 350);
            });
        });
    </script>
</body>

</html>
